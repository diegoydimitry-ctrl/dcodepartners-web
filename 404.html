<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>404 | Página no encontrada - D-Code Partners</title>

<meta name="robots" content="noindex,follow">

<style>
:root{
    --bg:#F7F4EF;
    --text:#211D19;
    --brown:#45301F;
    --gold:#A9825A;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:var(--bg);
    color:var(--text);
    font-family:Georgia,serif;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    text-align:center;
    padding:40px;
}

.container{
    max-width:700px;
}

.logo{
    font-size:15px;
    letter-spacing:4px;
    text-transform:uppercase;
    color:var(--gold);
    margin-bottom:35px;
}

h1{
    font-size:110px;
    color:var(--brown);
    line-height:1;
    margin-bottom:20px;
}

h2{
    font-size:44px;
    margin-bottom:20px;
    color:var(--brown);
}

p{
    font-size:22px;
    line-height:1.7;
    color:#666;
    margin-bottom:45px;
}

a{
    display:inline-block;
    background:var(--brown);
    color:white;
    text-decoration:none;
    padding:18px 42px;
    border-radius:10px;
    font-size:18px;
    transition:.25s;
}

a:hover{
    background:#2E2015;
    transform:translateY(-2px);
}

@media(max-width:768px){

h1{
font-size:72px;
}

h2{
font-size:30px;
}

p{
font-size:18px;
}

}
</style>

</head>

<body>

<div class="container">

<div class="logo">
D-CODE PARTNERS
</div>

<h1>404</h1>

<h2>Página no encontrada</h2>

<p>
La página que buscas no existe o ha cambiado de ubicación.
</p>

<a href="/">
Volver al inicio
</a>

</div>

</body>
</html>
